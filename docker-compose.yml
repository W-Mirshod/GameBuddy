services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ggarena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ggarena}
      POSTGRES_DB: ${POSTGRES_DB:-ggarena}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ggarena -d ggarena']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      STEAM_API_KEY: ${STEAM_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GCP_KEY_FILE: ${GCP_KEY_FILE}
      GCS_BUCKET: ${GCS_BUCKET}
      FRONTEND_URL: ${FRONTEND_URL}
      REFEREE_DASHBOARD_URL: ${REFEREE_DASHBOARD_URL}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      PAYME_NUMBER: ${PAYME_NUMBER}
      PAYME_DISPLAY_NAME: ${PAYME_DISPLAY_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3001}
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3001}
      VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  referee-dashboard:
    build:
      context: ./referee-dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3001}
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3001}
      VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:-}
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      PAYME_NUMBER: ${PAYME_NUMBER}
      PAYME_DISPLAY_NAME: ${PAYME_DISPLAY_NAME}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
